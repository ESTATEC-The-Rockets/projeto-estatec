<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATEC - Redefinir Senha</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-container">
        <div class="logo-area">
            <img src="../img/estatec.png" alt="ESTATEC" class="logo-img">
        </div>

        <div class="login-card">
            <h1 class="title">REDEFINIR SENHA</h1>
            
            <form id="resetForm">
                <div class="input-group">
                    <label for="newPassword">Nova senha:</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" placeholder="Ex.: 123456" required >
                        <button type="button" class="eye-icon toggle-btn" data-target="newPassword">
                            <span class="eye-span">👁️‍🗨️</span>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirme sua senha:</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Ex.: 123456" required>
                        <button type="button" class="eye-icon toggle-btn" data-target="confirmPassword">
                            <span class="eye-span">👁️‍🗨️</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-salvar">SALVAR</button>
                <button type="button" class="btn-voltar" onclick="window.location.href='../inicial.html'">
                VOLTAR AO LOGIN
            </button>

            </form>
        </div>

        <footer class="copyright">
            © ESTATEC
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
