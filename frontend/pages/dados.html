<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATEC - Dados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/menu.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="logo-container">
                    <span class="logo-text" style="font-size: 24px; font-weight: 800; color: #fff; letter-spacing: 1px;">ESTA<span style="color: #c1122f;">TEC</span></span>
                </div>
                
                <nav class="sidebar-nav">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a href="menu.html">
                                <i class="fa-solid fa-bars"></i>
                                <span class="menu-text">Menu</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="usuarios.html">
                                <i class="fa-solid fa-users"></i>
                                <span class="menu-text">Usuários</span>
                            </a>
                        </li>
                        <li class="nav-item active">
                            <a href="dados.html">
                                <i class="fa-solid fa-database"></i>
                                <span class="menu-text">Dados</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="solicitacoes.html">
                                <i class="fa-solid fa-bell"></i>
                                <span class="menu-text">Solicitações</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div class="sidebar-footer">
                <a href="../index.html" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span>
                </a>
                <p>&copy; 2026 ESTATECO</p>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <div class="header-buttons">
                    <a href="../pages/cadastroEstacionamento.html" class="btn-cadastro">CADASTRAR ESTACIONAMENTO</a>
                    
                    <div class="dropdown-wrapper">
                        <button class="btn-estacionamentos" id="btnEstacionamentos">
                            ESTACIONAMENTOS <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        
                        <ul class="dropdown-menu" id="dropdownEstacionamentos">
                        </ul>
                    </div>
                </div>

                <div class="header-right">
                    <button class="notifications-btn">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <div class="profile">
                        <i class="fa-solid fa-circle-user profile-avatar"></i>
                        <span>Dono Estacionamento</span>
                    </div>
                </div>
            </header>

            <div class="dados-section">
                
                <section class="chart-container">
                    <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 25px;">DADOS</h1>
                    <div class="chart-container-box">
                        <h3>Fluxo de Entrada no Estacionamento</h3>
                        <div class="chart-wrapper">
                            <canvas id="fluxoChart"></canvas>
                        </div>
                    </div>
                </section>

                <section class="historico-container" style="margin-top: 40px;">
                    <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 20px;">HISTÓRICO</h2>
                    <div class="historico-list" id="historicoList">
                    </div>
                </section>

            </div>
        </main>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2>EDITAR ESTACIONAMENTO</h2>
            <form id="editForm">
                <div class="form-group">
                    <label for="novoNome">NOVO NOME:</label>
                    <input type="text" id="novoNome" placeholder="Ex.: Estacionamento Novo" required>
                </div>
                <button type="submit" class="btn-modal-save">SALVAR</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../script/menu.js"></script>
</body>
</html>
