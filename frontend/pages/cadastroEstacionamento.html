<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATEC - Cadastro de Estacionamentos</title>
    <link rel="stylesheet" href="../css/cadastroEstacionamento.css">
    <!-- Importação da fonte Kameron -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kameron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Mantida a estrutura container original para manter o alinhamento vertical -->
    <main class="container">

        <!-- LOGO (Mantida centralizada no topo) -->
        <div class="logo-container">
            <img src="../img/estatec.png" alt="ESTATEC" class="logo">
        </div>

        <!-- CARD CADASTRO (Mantido no centro, mudando apenas os estilos visuais) -->
        <section class="cadastro-card">

            <h1>Cadastro Estacionamento</h1>

            <p class="description">
                Preencha as informações para cadastrar um novo estacionamento.
            </p>

            <form id="cadastroForm">

                <!-- Mantido o input hidden da sua API -->
                <input type="hidden" id="estacionamentoId">

                <!-- CAMPO NOME DO ESTACIONAMENTO -->
                <div class="input-group">
                    <label for="nomeEstacionamento">Nome do estacionamento</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="nomeEstacionamento"
                            placeholder="Ex.: Estacionamento Centro"
                            required>
                    </div>
                </div>

                <!-- BOTÃO CADASTRAR -->
                <button type="submit" class="btn-cadastrar">
                    CADASTRAR
                </button>

            </form>

        </section>

    </main>

    <!-- RODAPÉ PADRÃO -->
    <footer class="copyright">
        © 2026 ESTATEC. Todos os direitos reservados.
    </footer>

    <!-- Seus scripts originais -->
    <script src="../script/api.js"></script>
    <script src="../script/cadastroEstacionamento.js"></script>

</body>

</html>
