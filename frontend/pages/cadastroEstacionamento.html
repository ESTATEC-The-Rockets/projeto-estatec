<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ESTATEC - Cadastro de Estacionamentos</title>

    <link rel="stylesheet" href="../css/cadastroEstacionamento.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <main class="container">

        <div class="logo-container">

            <img
                src="../img/estatec.png"
                alt="ESTATEC"
                class="logo">

        </div>

        <!-- CARD CADASTRO -->

        <section class="cadastro-card">

            <h1>Cadastro Estacionamento</h1>

            <p class="description">
                Preencha as informações para cadastrar um novo estacionamento.
            </p>

            <form id="cadastroForm">

                <input
                    type="hidden"
                    id="estacionamentoId">

                <div class="input-group">

                    <label for="nomeEstacionamento">
                        Nome do estacionamento
                    </label>

                    <div class="input-wrapper">

                        <span class="input-icon">
                            🏢
                        </span>

                        <input
                            type="text"
                            id="nomeEstacionamento"
                            placeholder="Ex.: Estacionamento Centro"
                            required>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn-cadastrar">

                    CADASTRAR

                </button>

            </form>

        </section>

    </main>

    <footer class="copyright">
        © 2026 ESTATEC. Todos os direitos reservados.
    </footer>

    <script src="../script/api.js"></script>
    <script src="../script/cadastroEstacionamento.js"></script>

</body>

</html>
