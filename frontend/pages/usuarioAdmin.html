<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Estacionamento</title>
    <link rel="stylesheet" href="../css/usuarioAdmin.css">
</head>
<body>
    <div class="login-container">
        <h2>Acesso Administrativo</h2>
        <p>Entre com as credenciais de Admin para gerenciar o estacionamento.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuário / E-mail</label>
                <input type="text" id="username" required placeholder="Ex: admin">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>
        
        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>

    <script src="../script/usuarioAdmin.js"></script>
</body>
</html>
