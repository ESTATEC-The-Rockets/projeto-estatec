<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatéc - Painel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="..//css/usuario.css">
</head>
<body>

    <div class="area-logo">
            <img src="../img/estatec.png" alt="ESTATEC" class="logo-img">
    </div>

    <header class="barra-superior">
        <div class="controles-superiores">
            <button class="botao-escuro">CADASTRAR ESTACIONAMENTO</button>
            
            <div class="menu-suspenso">
                <button class="botao-menu-suspenso" id="botaoMenuSuspenso">
                    ESTACIONAMENTOS <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div class="conteudo-menu-suspenso" id="conteudoMenuSuspenso">
                    <div class="item-menu-suspenso">
                        <span>ESTACIONAMENTO 01</span>
                        <div class="acoes-menu-suspenso">
                            <i class="fa-solid fa-pen"></i>
                            <i class="fa-solid fa-trash"></i>
                        </div>
                    </div>
                    <div class="item-menu-suspenso">
                        <span>ESTACIONAMENTO 02</span>
                        <div class="acoes-menu-suspenso">
                            <i class="fa-solid fa-pen"></i>
                            <i class="fa-solid fa-trash"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="perfil-usuario">
            <i class="fa-solid fa-circle-user"></i>
            <span>DONO ESTACIONAMENTO</span>
        </div>
    </header>

    <aside class="barra-lateral">
        <nav class="navegacao-lateral">
            <a href="#" class="item-navegacao ativo"><i class="fa-solid fa-list"></i> MENU</a>
            <a href="#" class="item-navegacao"><i class="fa-solid fa-user"></i> USUÁRIO</a>
            <a href="#" class="item-navegacao"><i class="fa-solid fa-database"></i> DADOS</a>
        </nav>
        <div class="rodape-lateral">
            &copy; ESTATEC
        </div>
    </aside>

    <main class="conteudo-principal">
                <button class="botao-adicionar-texto">+</button>
            </section>
        </div>
    </main>

    <script src="..//script/usuario.js"></script>
</body>
</html>
