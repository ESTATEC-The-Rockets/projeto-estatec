<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATEC - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="black-header">
        <div class="logo-area">
            <img src="../img/estatec.png" alt="ESTATEC">
        </div>
        
        <div class="header-nav">
            <button class="btn-gray" onclick="window.location.href='../cadastroEstacionamento/index.html'">CADASTRAR ESTACIONAMENTO</button>
        </div>

        <div class="profile-area">
            <i class="fa-regular fa-user" style="font-size: 24px;"></i> 
            <span class="profile-name">DONO ESTACIONAMENTO</span>
        </div>
    </header>                

    <div class="red-divider"></div>

    <section class="hero-section">
        <div class="hero-image">
            <div class="hero-overlay">
                <div class="hero-text-card">
                    <p><span class="red-bold">Esta</span><span class="black-bold">Tec</span>: Menos intervenção, mais movimentação.</p>
                </div>
            </div>
        </div>
    </section>

    <div class="red-divider"></div>

    <main class="empty-state">
        <div class="button-group">
            <button class="btn-main-action" onclick="window.location.href='../cadastroEstacionamento/index.html'">
                CADASTRAR ESTACIONAMENTO
            </button>
            
            <button class="btn-main-action" onclick="window.location.href='../menu/index.html'">
                IR PARA O MENU
            </button>
        </div>
    </main>

    <footer class="main-footer">
        © ESTATEC
    </footer>

    <script src="script.js"></script>
</body>
</html>
