<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATEC - Cadastro Estacionamento</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-container">
        <div class="logo-area">
            <img src="../img/estatec.png" alt="ESTATEC" class="logo-img">
        </div>

        <div class="login-card">
            <h1 class="title">CADASTRO ESTACIONAMENTO</h1>
            
            <form id="cadastroForm">
                <div class="input-group">
                    <label for="nomeEstacionamento">Nome estacionamento:</label>
                    <input type="text" id="nomeEstacionamento" placeholder="Ex.: Estacione rápido" required>
                </div>

                <div class="input-group">
                    <label for="qtdVagas">Qtd. de vagas:</label>
                    <input type="number" id="qtdVagas" placeholder="Ex.: 120" required>
                </div>

                <div class="input-group">
                    <label for="local">Localização:</label>
                    <input type="text" id="local" placeholder="Ex.: Rua da Penha, 123" required>
                </div>

                <button type="submit" class="btn-cadastrar">CADASTRAR</button>
            </form>
        </div>

        <footer class="copyright">
            © ESTATEC
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
