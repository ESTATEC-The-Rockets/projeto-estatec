<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATEC - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-container">
        <div class="logo-area">
            <img src="../img/estatec.png" alt="ESTATEC" class="logo-img">        </div>

        <div class="login-card">
            <h1>LOGIN</h1>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="Ex.: estatec@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha:</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Ex.: 123456" required>
                        <button type="button" id="togglePassword" class="eye-icon">
                            <span id="eyeOpen">👁️‍🗨️</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-entrar">ENTRAR</button>
                <a href="../"></a>
            </form>

            <div class="footer-links">
                <a href="../redefinirSenha/index.html">Esqueci a senha</a>
            <div class="footer-links" id="forgotPassword">
            </div>
        </div>

        <footer class="copyright">
            © ESTATEC
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
