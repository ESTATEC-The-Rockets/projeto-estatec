<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<main class="main-container">
    <div class="logo-container">
        <img src="/img/estatec.png" alt="ESTATEC Logo" class="logo">
    </div>

    <section class="cards-wrapper">
        
        <div class="card">
            <div class="icon-placeholder">
                <img src="/img/usuario.png" alt="Usuário">
            </div>
            <button class="btn-entrar" type="button">ENTRAR COMO USUÁRIO</button>
        </div>

        <div class="card">
            <div class="icon-placeholder">
                <img src="/img/admin.png" alt="Admin">
            </div>
            <button class="btn-entrar" type="button">ENTRAR COMO ADMIN</button>
        </div>

    </section>

    <footer class="footer">
        © ESTATEC
    </footer>
</main>

<script src="script.js"></script>

</body>
</html>
